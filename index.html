<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do List</title>
    <!-- Import Google Font for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>To-Do List</h1>
            <div class="stats">
                <div class="stat-box">
                    <span id="total-tasks">0</span>
                    <p>Total Tasks</p>
                </div>
                <div class="stat-box">
                    <span id="completed-tasks">0</span>
                    <p>Completed</p>
                </div>
            </div>
        </header>

        <main>
            <!-- Input to add new tasks -->
            <div class="input-section">
                <input type="text" id="task-input" placeholder="What needs to be done?">
                <button id="add-btn" aria-label="Add task"><i class="fas fa-plus"></i></button>
            </div>

            <!-- List to display tasks -->
            <ul id="task-list" class="task-list">
                <!-- Tasks will be dynamically added here by JavaScript -->
            </ul>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
